name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements-dev.txt
            requirements-lock.txt

      - name: Install package and dev tooling
        run: python -m pip install -r requirements-dev.txt

      - name: Lint (ruff check)
        run: python -m ruff check src tests

      - name: Format (ruff format)
        run: python -m ruff format --check src tests

      - name: Type-check (mypy)
        run: python -m mypy

      - name: Test (pytest, with coverage gate)
        run: >-
          python -m pytest
          --cov=pvm
          --cov-report=term-missing
          --cov-fail-under=95

      - name: Smoke-test example programs
        run: |
          python -m pvm assemble examples/factorial.asm -o /tmp/factorial.bc
          python -m pvm validate /tmp/factorial.bc
          test "$(python -m pvm run /tmp/factorial.bc)" = "120"
